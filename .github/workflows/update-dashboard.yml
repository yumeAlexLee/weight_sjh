name: 更新体重看板

on:
  push:
    branches: [main]
    paths:
      - 'data/weight.csv'
  workflow_dispatch:

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate dashboard
        run: python scripts/generate_dashboard.py

      - name: Generate Gitee version
        run: python scripts/generate_gitee.py

      - name: Commit and push to GitHub
        run: |
          git config user.name "yumeAlexLee"
          git config user.email "yumealexlee@gmail.com"
          git add docs/index.html docs/index-gitee.html
          git diff --staged --quiet || git commit -m "auto: update weight dashboard"
          git push

      - name: Sync to Gitee
        run: |
          git remote add gitee https://alex-leee:${{ secrets.GITEE_TOKEN }}@gitee.com/alex-leee/weight-xmt.git
          git push gitee main -f || echo "⚠️ Gitee sync skipped (no token)"
