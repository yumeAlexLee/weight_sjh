<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体重记录 - sjh</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 16px;
    }
    .container { max-width: 900px; width: 100%; margin: 0 auto; }

    .header { padding: 8px 0 16px; }
    .header h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .header p { color: #64748b; font-size: 13px; margin-top: 2px; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: #1e293b;
      border-radius: 14px;
      padding: 14px 12px;
      text-align: center;
      border: 1px solid #334155;
    }
    .stat-card .label { font-size: 11px; color: #64748b; margin-bottom: 2px; letter-spacing: 0.3px; }
    .stat-card .value { font-size: 24px; font-weight: 700; line-height: 1.3; }
    .stat-card .value.loss { color: #22c55e; }
    .stat-card .value.gain { color: #ef4444; }
    .stat-card .value.neutral { color: #facc15; }

    .card {
      background: #1e293b;
      border-radius: 14px;
      padding: 18px;
      border: 1px solid #334155;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .form-row-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 12px; color: #64748b; font-weight: 500; }
    .form-group input, .form-group select {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px 14px;
      color: #e2e8f0;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-group input:focus { border-color: #3b82f6; }
    .form-group input::placeholder { color: #475569; }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.3px;
    }
    .btn:active { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .chart-wrapper { padding: 0; border: none; background: transparent; }
    .chart-wrapper canvas { width: 100% !important; }

    .table-wrap { overflow-x: auto; margin-top: -4px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left;
      padding: 10px 12px;
      color: #64748b;
      font-weight: 500;
      font-size: 12px;
      border-bottom: 1px solid #334155;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #1e293b; }
    td:first-child { font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    .note { color: #94a3b8; font-size: 12px; }

    .toast {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      z-index: 100;
      display: none;
      text-align: center;
    }
    .toast.success { background: #166534; color: #bbf7d0; display: block; }
    .toast.error { background: #7f1d1d; color: #fecaca; display: block; }

    .footer { text-align: center; color: #475569; font-size: 12px; padding: 8px 0 40px; }

    @media (min-width: 640px) {
      body { padding: 32px; }
      .header h1 { font-size: 26px; }
      .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
      .form-row-inputs { grid-template-columns: 1fr 1fr 1fr; }
      .card { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📉 体重记录</h1>
      <p>记录每日体重变化</p>
    </div>

    

    <div class="card">
      <div class="card-title">✏️ 记录体重</div>
      <div class="form-grid">
        <div class="form-row-inputs">
          <div class="form-group">
            <label>日期</label>
            <input type="date" id="input-date">
          </div>
          <div class="form-group">
            <label>体重 (kg)</label>
            <input type="number" id="input-weight" step="0.1" min="30" max="120" placeholder="55.0">
          </div>
        </div>
        <div class="form-group">
          <label>备注 (可选)</label>
          <input type="text" id="input-note" placeholder="例: 朝食前">
        </div>
        <button class="btn" id="btn-submit" onclick="addWeight()">提交</button>
      </div>
      <div id="toast" class="toast"></div>
    </div>

    <div class="card">
      <div class="card-title">📊 体重变化曲线</div>
      <div class="chart-wrapper">
        <canvas id="weightChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📋 记录明细</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>日期</th><th>体重</th><th>备注</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="footer">在网站上记录体重即可 ✨</div>
  </div>

  <script>
    const chartData = {"labels": [], "weights": [], "target": 55};

    function initChart() {
      const ctx = document.getElementById('weightChart').getContext('2d');
      const targetLine = new Array(chartData.labels.length).fill(chartData.target);
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: chartData.labels,
          datasets: [
            {
              label: '体重 (kg)',
              data: chartData.weights,
              borderColor: '#3b82f6',
              backgroundColor: 'rgba(59, 130, 246, 0.1)',
              borderWidth: 3,
              pointBackgroundColor: '#3b82f6',
              pointBorderColor: '#1e293b',
              pointBorderWidth: 2,
              pointRadius: 5,
              pointHoverRadius: 8,
              tension: 0.3,
              fill: true,
            },
            {
              label: `目标 ${chartData.target}kg`,
              data: targetLine,
              borderColor: '#22c55e',
              borderWidth: 2,
              borderDash: [8, 4],
              pointRadius: 0,
              pointHoverRadius: 0,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          aspectRatio: 1.8,
          interaction: { intersect: false, mode: 'index' },
          plugins: {
            legend: {
              labels: { color: '#94a3b8', font: { size: 13 }, usePointStyle: true, padding: 16 }
            },
            tooltip: {
              backgroundColor: '#1e293b',
              titleColor: '#e2e8f0',
              bodyColor: '#cbd5e1',
              borderColor: '#334155',
              borderWidth: 1,
              padding: 12,
              cornerRadius: 8,
              callbacks: {
                label: function(context) {
                  if (context.dataset.label.includes('目标')) return context.dataset.label;
                  return context.parsed.y + 'kg';
                }
              }
            }
          },
          scales: {
            x: { grid: { color: 'rgba(51, 65, 85, 0.5)' }, ticks: { color: '#64748b', maxTicksLimit: 15 } },
            y: { min: 40, max: 80, grid: { color: 'rgba(51, 65, 85, 0.5)' }, ticks: { color: '#64748b', stepSize: 2, callback: function(v) { return v + 'kg'; } } }
          }
        }
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      var today = new Date().toISOString().split('T')[0];
      if (document.getElementById('input-date')) {
        document.getElementById('input-date').value = today;
        document.getElementById('input-date').max = today;
      }
      if (chartData.labels.length > 0) initChart();
    });

    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type;
      setTimeout(function() { t.className = 'toast'; }, 3000);
    }

    function addWeight() {
      var date = document.getElementById('input-date').value;
      var weight = document.getElementById('input-weight').value;
      var note = document.getElementById('input-note').value.trim();
      if (!date) { showToast('请选择日期', 'error'); return; }
      if (!weight) { showToast('请输入体重', 'error'); return; }
      var btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.textContent = '提交中...';
      fetch('/api/add-weight', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date: date, weight: parseFloat(weight), note: note })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          showToast('✅ 记录成功！请刷新页面查看', 'success');
          document.getElementById('input-weight').value = '';
          document.getElementById('input-note').value = '';
        } else {
          showToast('❌ ' + (data.error || '提交失败'), 'error');
        }
      })
      .catch(function(err) {
        showToast('❌ 网络错误: ' + err.message, 'error');
      })
      .finally(function() {
        btn.disabled = false;
        btn.textContent = '提交';
      });
    }
  </script>
</body>
</html>
